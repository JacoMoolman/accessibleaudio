services:
  - type: web
    name: accessible-audio-submit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        value: accessible-audio-submissions
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://accessibleaudio.co.za,https://www.accessibleaudio.co.za,https://accessible-audio-submit.onrender.com
